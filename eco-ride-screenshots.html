<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Ride: App Screenshots - Portfolio</title>
    <meta name="description" content="App Screenshots for the Eco Ride Project">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .portfolio-header {
            padding: 120px 5% 40px;
            text-align: center;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 600;
            margin-bottom: 2rem;
            transition: color 0.3s ease, gap 0.3s ease;
        }
        .back-link:hover {
            color: var(--accent-1);
            gap: 12px;
        }
        
        /* Mobile Mockup Grid */
        .mockup-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 4rem 2rem;
            padding: 2rem 5%;
            max-width: 1200px;
            margin: 0 auto 5rem;
        }
        
        .mockup-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }
        
        .mockup-title {
            margin-top: 1.5rem;
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 24px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(10px);
        }
        
        /* iPhone Mockup Frame (3D Parallax Setup) */
        .phone-mockup {
            background: #111;
            border-radius: 45px;
            padding: 14px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 0 0 2px #333, inset 0 0 0 6px #000;
            position: relative;
            width: 100%;
            max-width: 320px;
            transition: box-shadow 0.6s ease;
            will-change: transform;
            transform-style: preserve-3d;
        }
        
        .phone-mockup:hover {
            box-shadow: 0 40px 80px rgba(0,0,0,0.8), 0 0 40px rgba(99, 102, 241, 0.2), inset 0 0 0 2px var(--accent-1), inset 0 0 0 6px #000;
        }
        
        /* The Notch */
        .phone-mockup::before {
            content: '';
            position: absolute;
            top: 14px;
            left: 50%;
            transform: translateX(-50%) translateZ(25px);
            width: 140px;
            height: 30px;
            background: #000;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            z-index: 10;
        }
        
        .phone-screen {
            background: #000;
            border-radius: 32px;
            overflow: hidden;
            position: relative;
            aspect-ratio: 9/19.5;
            display: flex;
            transform: translateZ(15px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: transform 0.4s ease;
        }
        
        .phone-screen img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            transition: filter 0.5s ease, transform 0.5s ease;
        }

        .phone-mockup:hover .phone-screen img {
            transform: scale(1.03);
            filter: brightness(1.05);
        }
        
        .premium-mockup {
            opacity: 0;
            transform: translateY(30px);
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.8s ease-out;
        }
        .page-loaded .premium-mockup {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <!-- Custom Cursor -->
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <!-- Animated Full Background -->
    <div class="animated-bg dark-bg"></div>
    <div class="animated-bg light-bg"></div>
    
    <nav class="navbar intro-elem intro-fade-down" style="justify-content: space-between;">
        <div class="nav-left">
            <a href="#" onclick="history.back(); return false;" class="nav-back-btn" aria-label="Back to Home">
                <i class="fa-solid fa-arrow-left"></i> <span class="back-text">Back to Home</span>
            </a>
        </div>
        <div class="nav-right">
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">
                <div class="icon-wrapper">
                    <i class="fa-solid fa-moon icon-moon"></i>
                    <i class="fa-solid fa-sun icon-sun"></i>
                </div>
                <span class="theme-text"></span>
            </button>
        </div>
    </nav>

    <main>
        <section class="portfolio-header">
            
            <h1 class="section-title" style="margin-bottom: 1rem;">Eco Ride: <span class="gradient-text">App Screenshots</span></h1>
            <p class="tagline" style="margin: 0 auto; text-align: center;">A visual walkthrough of the user interface for the smart cab-sharing application.</p>
        </section>

        <!-- Screenshots Mockup Grid -->
        <section class="mockup-grid">
            
            <!-- Screen 1 -->
            <div class="mockup-container premium-mockup" style="transition-delay: 0s;">
                <div class="phone-mockup" onclick="openLightbox('Public/Images/1.jpeg')" style="cursor: pointer;">
                    <div class="phone-screen">
                        <img src="Public/Images/1.jpeg" alt="Eco Ride Splash Screen">
                    </div>
                </div>
                <div class="mockup-title">Login/Signup</div>
            </div>

            <!-- Screen 2 -->
            <div class="mockup-container premium-mockup" style="transition-delay: 0.1s;">
                <div class="phone-mockup" onclick="openLightbox('Public/Images/2.jpeg')" style="cursor: pointer;">
                    <div class="phone-screen">
                        <img src="Public/Images/2.jpeg" alt="Eco Ride Login Screen">
                    </div>
                </div>
                <div class="mockup-title">Home Screen</div>
            </div>

            <!-- Screen 3 -->
            <div class="mockup-container premium-mockup" style="transition-delay: 0.2s;">
                <div class="phone-mockup" onclick="openLightbox('Public/Images/3.jpeg')" style="cursor: pointer;">
                    <div class="phone-screen">
                        <img src="Public/Images/3.jpeg" alt="Eco Ride Home Screen">
                    </div>
                </div>
                <div class="mockup-title">Admin Login</div>
            </div>

            <!-- Screen 4 -->
            <div class="mockup-container premium-mockup" style="transition-delay: 0.3s;">
                <div class="phone-mockup" onclick="openLightbox('Public/Images/4.jpeg')" style="cursor: pointer;">
                    <div class="phone-screen">
                        <img src="Public/Images/4.jpeg" alt="Eco Ride Ride Details Screen">
                    </div>
                </div>
                <div class="mockup-title">Ride Details</div>
            </div>

            <!-- Screen 5 -->
            <div class="mockup-container premium-mockup" style="transition-delay: 0.4s;">
                <div class="phone-mockup" onclick="openLightbox('Public/Images/5.jpeg')" style="cursor: pointer;">
                    <div class="phone-screen">
                        <img src="Public/Images/5.jpeg" alt="Eco Ride Booking Confirmation Screen">
                    </div>
                </div>
                <div class="mockup-title">Admin Dashboard</div>
            </div>

            <!-- Screen 6 -->
            <div class="mockup-container premium-mockup" style="transition-delay: 0.5s;">
                <div class="phone-mockup" onclick="openLightbox('Public/Images/6.jpeg')" style="cursor: pointer;">
                    <div class="phone-screen">
                        <img src="Public/Images/6.jpeg" alt="Eco Ride Profile Screen">
                    </div>
                </div>
                <div class="mockup-title">Profile</div>
            </div>

        </section>
        <div style="text-align: center; margin-bottom: 4rem;">
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Muhammed Hisham P. All rights reserved.</p>
    </footer>

    <!-- Lightbox Modal -->
    <div id="lightbox" class="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()" aria-label="Close Lightbox">
            <i class="fa-solid fa-xmark"></i>
        </button>
        <div class="lightbox-spinner" id="lightbox-spinner"></div>
        <div class="phone-mockup lightbox-content" style="height: 85vh; width: auto; aspect-ratio: 9/19.5; max-width: 90vw; margin: 0 auto; cursor: default;">
            <div class="phone-screen" style="height: 100%; width: 100%;">
                <img id="lightbox-img" src="" alt="Full Screen Screenshot" style="height: 100%;">
            </div>
        </div>
    </div>

    <!-- GSAP for 3D Scroll Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            setTimeout(() => {
                document.body.classList.add('page-loaded');
            }, 100);
        });
    </script>
</body>
</html>
